<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --leather: #4a2c2a;
            --parchment: #f4ebd9;
            --gold: #d4af37;
            --ink: #2b2b2b;
            --wood: #8b5a2b;
            --paper: #fffdf9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--parchment);
            color: var(--ink);
            background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: var(--paper);
            text-align: center;
            padding: 4rem 1rem;
            border-bottom: 8px solid var(--leather);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .subtitle {
            font-style: italic;
            font-size: 1.2rem;
            opacity: 0.9;
            font-family: 'Playfair Display', serif;
        }

        nav {
            background: var(--leather);
            display: flex;
            justify-content: center;
            padding: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav button {
            background: transparent;
            border: none;
            color: var(--parchment);
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
            transition: all 0.3s;
            border-radius: 4px;
            margin: 0 0.25rem;
        }

        nav button:hover, nav button.active {
            background: var(--wood);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--paper);
            padding: 0.5rem;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(139,90,43,0.2);
        }

        input[type="text"] {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            background: var(--paper);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--wood);
        }

        .btn {
            background: var(--wood);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--leather);
        }

        .bookshelf {
            display: none;
            animation: fadeIn 0.5s;
        }

        .bookshelf.active {
            display: block;
        }

        .shelf-title {
            font-family: 'Playfair Display', serif;
            color: var(--leather);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .book {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        .book:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .book-cover {
            height: 200px;
            background: #f1f3f4;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .book-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--leather);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 3px;
            font-size: 0.8rem;
            font-family: 'Playfair Display', serif;
        }

        .book-info {
            padding: 1.5rem;
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--leather);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .book-author {
            color: var(--wood);
            font-style: italic;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .book-desc {
            font-size: 0.9rem;
            color: var(--ink);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .book-actions {
            display: flex;
            justify-content: space-between;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #777;
            font-style: italic;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            font-style: italic;
            color: var(--wood);
        }

        footer {
            text-align: center;
            padding: 3rem 1rem;
            margin-top: 4rem;
            background: var(--leather);
            color: var(--parchment);
            font-family: 'Playfair Display', serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Personal Library</h1>
        <p class="subtitle">Track your literary journey</p>
    </header>

    <nav>
        <button onclick="switchTab('discover')" id="tab-discover" class="active"><i class="fas fa-search"></i> Find Books</button>
        <button onclick="switchTab('read')" id="tab-read"><i class="fas fa-book-open"></i> Books I've Read</button>
        <button onclick="switchTab('want')" id="tab-want"><i class="fas fa-bookmark"></i> Want to Read</button>
    </nav>

    <div class="container">
        <!-- Discover Tab -->
        <div id-shelf="discover" class="bookshelf active">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by title, author, or genre..." onkeypress="if(event.key === 'Enter') searchBooks()">
                <button class="btn" onclick="searchBooks()"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="book-grid" id="search-results">
                <div class="empty-message">Search for books to expand your library.</div>
            </div>
        </div>

        <!-- Read Tab -->
        <div id-shelf="read" class="bookshelf">
            <h2 class="shelf-title">Completed Works</h2>
            <div class="book-grid" id="read-books"></div>
        </div>

        <!-- Want to Read Tab -->
        <div id-shelf="want" class="bookshelf">
            <h2 class="shelf-title">The Reading List</h2>
            <div class="book-grid" id="want-books"></div>
        </div>
    </div>

    <footer>
        <p>"You have bewitched me, body and soul, and I love—I love—I love you."</p>
    </footer>

    <script>
        // Initialize library data structures from LocalStorage
        let library = JSON.parse(localStorage.getItem('myLibrary')) || {
            read: [],
            want: []
        };

        function saveLibrary() {
            localStorage.setItem('myLibrary', JSON.stringify(library));
        }

        function switchTab(shelfId) {
            document.querySelectorAll('.bookshelf').forEach(shelf => shelf.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            
            const selectedShelf = document.querySelector(`[id-shelf="${shelfId}"]`);
            if(selectedShelf) selectedShelf.classList.add('active');
            
            const selectedTab = document.getElementById(`tab-${shelfId}`);
            if(selectedTab) selectedTab.classList.add('active');

            if (shelfId === 'read' || shelfId === 'want') {
                renderSavedShelf(shelfId);
            }
        }

        async function searchBooks() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const grid = document.getElementById('search-results');
            grid.innerHTML = '<div class="loading">Searching the archives...</div>';

            try {
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No books found. Try another search.</div>';
                    return;
                }

                grid.innerHTML = '';
                data.items.forEach(item => {
                    const info = item.volumeInfo;
                    const bookId = item.id;
                    const title = info.title || 'Unknown Title';
                    const authors = info.authors ? info.authors.join(', ') : 'Unknown Author';
                    const desc = info.description ? info.description.substring(0, 140) + '...' : 'No summary available.';
                    const cover = info.imageLinks ? info.imageLinks.thumbnail.replace('http://', 'https://') : 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=200&q=80';

                    const bookEl = document.createElement('div');
                    bookEl.className = 'book';
                    bookEl.innerHTML = `
                        <div class="book-cover" style="background-image: url('${cover}')"></div>
                        <div class="book-info">
                            <h3 class="book-title">${title}</h3>
                            <p class="book-author">by ${authors}</p>
                            <p class="book-desc">${desc}</p>
                            <div class="book-actions">
                                <button class="btn" style="padding: 0.5rem 0.8rem; font-size: 0.85rem;" onclick="addToShelf('read', '${bookId}', \`${escapeElement(title)}\`, \`${escapeElement(authors)}\`, '${cover}')"><i class="fas fa-check"></i> Read</button>
                                <button class="btn" style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: var(--leather);" onclick="addToShelf('want', '${bookId}', \`${escapeElement(title)}\`, \`${escapeElement(authors)}\`, '${cover}')"><i class="fas fa-bookmark"></i> Want</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(bookEl);
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="empty-message">Error fetching from the archives. Try again later.</div>';
            }
        }

        function escapeElement(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/`/g, '\\`');
        }

        function addToShelf(shelf, id, title, author, cover) {
            // Avoid duplicate additions
            if (library[shelf].some(b => b.id === id)) {
                alert("Book is already on this shelf!");
                return;
            }
            
            // Remove from the opposite shelf if moving
            const otherShelf = shelf === 'read' ? 'want' : 'read';
            library[otherShelf] = library[otherShelf].filter(b => b.id !== id);

            library[shelf].push({ id, title, author, cover });
            saveLibrary();
            alert(`Added "${title}" to your shelf!`);
        }

        function removeFromShelf(shelf, id) {
            library[shelf] = library[shelf].filter(b => b.id !== id);
            saveLibrary();
            renderSavedShelf(shelf);
        }

        function renderSavedShelf(shelf) {
            const grid = document.getElementById(`${shelf}-books`);
            grid.innerHTML = '';

            if (library[shelf].length === 0) {
                grid.innerHTML = '<div class="empty-message">This shelf is empty. Discover new titles to fill it!</div>';
                return;
            }

            library[shelf].forEach(book => {
                const bookEl = document.createElement('div');
                bookEl.className = 'book';
                bookEl.innerHTML = `
                    <div class="book-cover" style="background-image: url('${book.cover}')">
                        <span class="book-status">${shelf === 'read' ? 'Finished' : 'Queued'}</span>
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">${book.title}</h3>
                        <p class="book-author">by ${book.author}</p>
                        <div class="book-actions" style="justify-content: flex-end;">
                            <button class="btn" style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: #c0392b;" onclick="removeFromShelf('${shelf}', '${book.id}')"><i class="fas fa-trash"></i> Remove</button>
                        </div>
                    </div>
                `;
                grid.appendChild(bookEl);
            });
        }
    </script>
</body>
</html>
