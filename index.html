<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Book Library</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, serif;
      background: #fff7f8;
      color: #3b2f2f;
      padding: 24px;
    }

    .container {
      max-width: 950px;
      margin: auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      color: #9b4058;
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    header p {
      color: #6f5555;
      font-size: 1.05rem;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: 2px solid #e5b9c4;
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #b84f6b;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:hover {
      background: #9b4058;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 25px 0 18px;
      flex-wrap: wrap;
    }

    .tab {
      background: #f1c9d2;
      color: #4a3037;
    }

    .tab.active {
      background: #b84f6b;
      color: white;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
    }

    .book {
      background: white;
      border: 1px solid #f0cfd7;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 4px 12px rgba(155, 64, 88, 0.12);
    }

    .book img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 12px;
      background: #f7e5e9;
    }

    .book h3 {
      font-size: 1rem;
      margin-bottom: 6px;
      color: #7b3348;
    }

    .book p {
      font-size: 0.9rem;
      color: #6a5555;
      margin-bottom: 12px;
    }

    .book-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small {
      font-size: 0.8rem;
      padding: 9px 10px;
    }

    .remove {
      background: #6f5555;
    }

    .quote {
      margin-top: 45px;
      text-align: center;
      font-size: 1.25rem;
      color: #9b4058;
      font-style: italic;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .search-box {
        flex-direction: column;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Our Book Library</h1>
      <p>A little place to find stories, save favorites, and remember every book journey.</p>
    </header>

    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Search for a book..." />
      <button onclick="searchBooks()">Search</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('search', this)">Search Results</button>
      <button class="tab" onclick="showTab('read', this)">Books I've Read</button>
      <button class="tab" onclick="showTab('want', this)">Want to Read</button>
    </div>

    <div id="bookList" class="books"></div>

    <div class="quote">
      “You have bewitched me, body and soul, and I love—I love—I love you.”
    </div>
  </div>

  <script>
    let currentTab = "search";
    let searchResults = [];

    let readBooks = JSON.parse(localStorage.getItem("readBooks")) || [];
    let wantBooks = JSON.parse(localStorage.getItem("wantBooks")) || [];

    async function searchBooks() {
      const searchInput = document.getElementById("searchInput");
      const query = searchInput.value.trim();

      if (!query) {
        alert("Please type a book name first.");
        return;
      }

      const bookList = document.getElementById("bookList");
      bookList.innerHTML = "<p>Searching for books...</p>";

      try {
        const response = await fetch(
          `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}`
        );

        const data = await response.json();

        searchResults = data.docs.slice(0, 12).map(book => ({
          title: book.title || "Unknown Title",
          author: book.author_name ? book.author_name[0] : "Unknown Author",
          cover: book.cover_i
            ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
            : ""
        }));

        currentTab = "search";
        setActiveTab(0);
        displayBooks(searchResults);
      } catch (error) {
        bookList.innerHTML = "<p>Something went wrong. Please try again.</p>";
      }
    }

    function displayBooks(books) {
      const bookList = document.getElementById("bookList");
      bookList.innerHTML = "";

      if (books.length === 0) {
        bookList.innerHTML = "<p>No books here yet.</p>";
        return;
      }

      books.forEach((book, index) => {
        const bookCard = document.createElement("div");
        bookCard.className = "book";

        bookCard.innerHTML = `
          ${book.cover ? `<img src="${book.cover}" alt="${book.title} cover">` : ""}
          <h3>${book.title}</h3>
          <p>by ${book.author}</p>
          <div class="book-buttons">
            ${
              currentTab === "search"
                ? `
                  <button class="small" onclick="saveBook(${index}, 'read')">Books I've Read</button>
                  <button class="small" onclick="saveBook(${index}, 'want')">Want to Read</button>
                `
                : `<button class="small remove" onclick="removeBook(${index})">Remove</button>`
            }
          </div>
        `;

        bookList.appendChild(bookCard);
      });
    }

    function saveBook(index, listName) {
      const book = searchResults[index];

      if (listName === "read") {
        readBooks.push(book);
        localStorage.setItem("readBooks", JSON.stringify(readBooks));
        alert("Saved to Books I've Read.");
      }

      if (listName === "want") {
        wantBooks.push(book);
        localStorage.setItem("wantBooks", JSON.stringify(wantBooks));
        alert("Saved to Want to Read.");
      }
    }

    function showTab(tabName, button) {
      currentTab = tabName;

      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.remove("active");
      });

      button.classList.add("active");

      if (tabName === "search") {
        displayBooks(searchResults);
      }

      if (tabName === "read") {
        displayBooks(readBooks);
      }

      if (tabName === "want") {
        displayBooks(wantBooks);
      }
    }

    function setActiveTab(index) {
      const tabs = document.querySelectorAll(".tab");

      tabs.forEach(tab => {
        tab.classList.remove("active");
      });

      tabs[index].classList.add("active");
    }

    function removeBook(index) {
      if (currentTab === "read") {
        readBooks.splice(index, 1);
        localStorage.setItem("readBooks", JSON.stringify(readBooks));
        displayBooks(readBooks);
      }

      if (currentTab === "want") {
        wantBooks.splice(index, 1);
        localStorage.setItem("wantBooks", JSON.stringify(wantBooks));
        displayBooks(wantBooks);
      }
    }
  </script>
</body>
</html>
