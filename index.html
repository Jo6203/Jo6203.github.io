<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Book Library</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8efe6;
      color: #2b2b2b;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    header {
      text-align: center;
      padding: 30px 10px;
    }

    h1 {
      font-size: 38px;
      color: #6b3f2a;
    }

    p {
      margin-top: 10px;
      color: #6b5b53;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #6b3f2a;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #4e2d1e;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .book {
      background: #fffaf5;
      padding: 15px;
      border-radius: 15px;
      border: 1px solid #ead7c7;
    }

    .book h3 {
      color: #6b3f2a;
      margin-bottom: 6px;
    }

    .book small {
      color: #7a6a61;
    }

    .delete {
      background: #b84a4a;
      margin-top: 12px;
      padding: 10px;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #7a6a61;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Our Book Library 📚</h1>
      <p>A little place to save books we want to read.</p>
    </header>

    <div class="card">
      <h2>Add a Book</h2>
      <input type="text" id="title" placeholder="Book title" />
      <input type="text" id="author" placeholder="Author" />
      <button onclick="addBook()">Add Book</button>
    </div>

    <div class="card">
      <h2>Saved Books</h2>
      <div id="bookList" class="books"></div>
    </div>

    <footer>
      Made with love 🤎
    </footer>
  </div>

  <script>
    let books = JSON.parse(localStorage.getItem("books")) || [];

    function saveBooks() {
      localStorage.setItem("books", JSON.stringify(books));
    }

    function displayBooks() {
      const bookList = document.getElementById("bookList");
      bookList.innerHTML = "";

      if (books.length === 0) {
        bookList.innerHTML = "<p>No books added yet.</p>";
        return;
      }

      books.forEach((book, index) => {
        bookList.innerHTML += `
          <div class="book">
            <h3>${book.title}</h3>
            <small>by ${book.author || "Unknown Author"}</small>
            <button class="delete" onclick="deleteBook(${index})">Remove</button>
          </div>
        `;
      });
    }

    function addBook() {
      const title = document.getElementById("title").value.trim();
      const author = document.getElementById("author").value.trim();

      if (title === "") {
        alert("Please enter a book title.");
        return;
      }

      books.push({ title, author });
      saveBooks();
      displayBooks();

      document.getElementById("title").value = "";
      document.getElementById("author").value = "";
    }

    function deleteBook(index) {
      books.splice(index, 1);
      saveBooks();
      displayBooks();
    }

    displayBooks();
  </script>
</body>
</html>
