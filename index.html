<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sage: #708238;
            --light-sage: #f2f5eb;
            --linen: #f9f8f6;
            --charcoal: #2c3e50;
            --gold-accent: #d4af37;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--linen);
            color: var(--charcoal);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('https://images.unsplash.com/photo-1513001900722-370f803f498d?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: var(--charcoal);
            text-align: center;
            padding: 5rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 400;
            margin-bottom: 0.8rem;
            letter-spacing: 2px;
            color: var(--charcoal);
        }

        .subtitle {
            font-style: italic;
            font-size: 1.3rem;
            color: var(--sage);
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        nav {
            background: var(--white);
            display: flex;
            justify-content: center;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        nav button {
            background: transparent;
            border: none;
            color: var(--charcoal);
            padding: 0.7rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Source Sans Pro', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 30px;
            margin: 0 0.5rem;
        }

        nav button:hover {
            background: var(--light-sage);
            color: var(--sage);
        }

        nav button.active {
            background: var(--sage);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(112, 130, 56, 0.2);
        }

        .container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .search-container {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 3rem;
            background: var(--white);
            padding: 0.75rem;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        input[type="text"] {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 30px;
            font-size: 1.05rem;
            background: transparent;
        }

        input[type="text"]:focus {
            outline: none;
        }

        .btn {
            background: var(--charcoal);
            color: var(--white);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--sage);
            transform: translateY(-1px);
        }

        .bookshelf {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .bookshelf.active {
            display: block;
        }

        .shelf-title {
            font-family: 'Playfair Display', serif;
            color: var(--charcoal);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
        }

        .book {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .book:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }

        .book-cover {
            height: 240px;
            background: #f7f7f7;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .book-status {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            color: var(--sage);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .book-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--charcoal);
            margin-bottom: 0.4rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .book-author {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .book-desc {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            flex-grow: 1;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
        }

        .book-actions .btn {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            text-align: center;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: #95a5a6;
            font-style: italic;
            font-size: 1.1rem;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            font-style: italic;
            color: var(--sage);
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 5rem 1rem;
            margin-top: 6rem;
            background: var(--white);
            color: #7f8c8d;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Personal Library</h1>
        <p class="subtitle">Track your literary journey</p>
    </header>

    <nav>
        <button onclick="switchTab('discover')" id="tab-discover" class="active"><i class="fas fa-search"></i> Find Books</button>
        <button onclick="switchTab('read')" id="tab-read"><i class="fas fa-book-open"></i> Books I've Read</button> 
        <button onclick="switchTab('want')" id="tab-want"><i class="fas fa-bookmark"></i> Want to Read</button>
    </nav>

    <div class="container">
        <!-- Discover Tab -->
        <div id="discover" class="bookshelf active">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by title, author, or genre..." onkeypress="if(event.key === 'Enter') searchBooks()">
                <button class="btn" onclick="searchBooks()"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="book-grid" id="search-results">
                <div class="empty-message">Search for books to expand your library.</div>
            </div>
        </div>

        <!-- Read Tab -->
        <div id="read" class="bookshelf">
            <h2 class="shelf-title">Completed Works</h2>
            <div class="book-grid" id="read-books"></div>
        </div>

        <!-- Want to Read Tab -->
        <div id="want" class="bookshelf">
            <h2 class="shelf-title">The Reading List</h2>
            <div class="book-grid" id="want-books"></div>
        </div>
    </div>

    <footer>
        <p>"You have bewitched me, body and soul, and I love—I love—I love you."</p>
    </footer>

    <script>
        let library = JSON.parse(localStorage.getItem('myLibrary')) || {
            read: [],
            want: []
        };

        function saveLibrary() {
            localStorage.setItem('myLibrary', JSON.stringify(library));
        }

        function switchTab(shelfId) {
            document.querySelectorAll('.bookshelf').forEach(shelf => shelf.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            
            const selectedShelf = document.getElementById(shelfId);
            if(selectedShelf) selectedShelf.classList.add('active');
            
            const selectedTab = document.getElementById('tab-' + shelfId);
            if(selectedTab) selectedTab.classList.add('active');

            if (shelfId === 'read' || shelfId === 'want') {
                renderSavedShelf(shelfId);
            }
        }

        async function searchBooks() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const grid = document.getElementById('search-results');
            grid.innerHTML = '<div class="loading">Searching the archives...</div>';

            try {
                const response = await fetch('https://www.googleapis.com/books/v1/volumes?q=' + encodeURIComponent(query));
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No books found. Try another search.</div>';
                    return;
                }

                grid.innerHTML = '';
                data.items.forEach(item => {
                    const info = item.volumeInfo;
                    const bookId = item.id;
                    const title = info.title || 'Unknown Title';
                    const authors = info.authors ? info.authors.join(', ') : 'Unknown Author';
                    const desc = info.description ? info.description.substring(0, 140) + '...' : 'No summary available.';
                    const cover = info.imageLinks ? info.imageLinks.thumbnail.replace('http://', 'https://') : 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=200&q=80';

                    const bookEl = document.createElement('div');
                    bookEl.className = 'book';
                    bookEl.innerHTML = `
                        <div class="book-cover" style="background-image: url('${cover}')"></div>
                        <div class="book-info">
                            <h3 class="book-title">${title}</h3>
                            <p class="book-author">by ${authors}</p>
                            <p class="book-desc">${desc}</p>
                            <div class="book-actions">
                                <button class="btn" onclick="addToShelf('read', '${bookId}', \`${escapeElement(title)}\`, \`${escapeElement(authors)}\`, '${cover}')"><i class="fas fa-check"></i> Read</button>
                                <button class="btn" style="background: var(--sage);" onclick="addToShelf('want', '${bookId}', \`${escapeElement(title)}\`, \`${escapeElement(authors)}\`, '${cover}')"><i class="fas fa-bookmark"></i> Want</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(bookEl);
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="empty-message">Error fetching from the archives. Try again later.</div>';
            }
        }

        function escapeElement(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/`/g, '\\`');
        }

        function addToShelf(shelf, id, title, author, cover) {
            if (library[shelf].some(b => b.id === id)) {
                alert("Book is already on this shelf!");
                return;
            }
            const otherShelf = shelf === 'read' ? 'want' : 'read';
            library[otherShelf] = library[otherShelf].filter(b => b.id !== id);

            library[shelf].push({ id, title, author, cover });
            saveLibrary();
            alert(`Added "${title}" to your shelf!`);
        }

        function removeFromShelf(shelf, id) {
            library[shelf] = library[shelf].filter(b => b.id !== id);
            saveLibrary();
            renderSavedShelf(shelf);
        }

        function renderSavedShelf(shelf) {
            const grid = document.getElementById(shelf + '-books');
            grid.innerHTML = '';

            if (library[shelf].length === 0) {
                grid.innerHTML = '<div class="empty-message">This shelf is empty. Discover new titles to fill it!</div>';
                return;
            }

            library[shelf].forEach(book => {
                const bookEl = document.createElement('div');
                bookEl.className = 'book';
                bookEl.innerHTML = `
                    <div class="book-cover" style="background-image: url('${book.cover}')">
                        <span class="book-status">${shelf === 'read' ? 'Finished' : 'Queued'}</span>
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">${book.title}</h3>
                        <p class="book-author">by ${book.author}</p>
                        <div class="book-actions" style="justify-content: flex-end;">
                            <button class="btn" style="background: #c0392b;" onclick="removeFromShelf('${shelf}', '${book.id}')"><i class="fas fa-trash"></i> Remove</button>
                        </div>
                    </div>
                `;
                grid.appendChild(bookEl);
            });
        }
    </script>
</body>
</html>
